<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Waste Assistant</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #064e3b, #022c22);
    color: #e5f9f1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Chat Card */
.chat-wrapper {
    width: 100%;
    max-width: 500px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

/* Header */
header {
    padding: 16px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    background: rgba(16, 185, 129, 0.2);
    color: #a7f3d0;
}

/* Chat Container */
#chat-container {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* Messages */
.message {
    margin: 8px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease-in-out;
}

/* User */
.user {
    background: linear-gradient(135deg, #10b981, #059669);
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

/* Bot */
.bot {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-bottom-left-radius: 4px;
}

/* Input Area */
#input-container {
    display: flex;
    padding: 10px;
    background: rgba(2, 44, 34, 0.9);
}

/* Input */
input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1px solid rgba(16,185,129,0.3);
}

/* Button */
button {
    margin-left: 10px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

/* Button Hover */
button:hover {
    transform: scale(1.05);
}

/* Scrollbar */
#chat-container::-webkit-scrollbar {
    width: 5px;
}
#chat-container::-webkit-scrollbar-thumb {
    background: #10b981;
    border-radius: 10px;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 600px) {
    .chat-wrapper {
        height: 100vh;
        border-radius: 0;
    }
}
</style>

</head>

<body>

<div class="chat-wrapper">

    <header>
        🌱 Smart Waste Segregation Assistant
    </header>

    <div id="chat-container">
        <div class="message bot">
            Hello! Ask me how to dispose or classify waste ♻️
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type waste query..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const API_URL = "/api/chatbot/chat";
let sessionId = null;

function addMessage(text, sender) {
    const chat = document.getElementById("chat-container");
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message,
                session_id: sessionId
            })
        });

        if (!res.ok) {
            let errText = "Server error";
            try {
                const errData = await res.json();
                errText = errData.error || errText;
            } catch {}

            throw new Error(errText);
        }

        const data = await res.json();

        const reply = data.response || "No response";
        sessionId = data.session_id || sessionId;

        addMessage(reply, "bot");

    } catch (err) {
        addMessage(`⚠️ ${err.message}`, "bot");
    }
}

// Enter key support
document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
